<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Task Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width:420px;margin-top:80px">
    <h2 class="mb-4">Sign in</h2>
    <div th:if="${param.error}" class="alert alert-danger">Invalid credentials.</div>
    <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>
    <div th:if="${param.registered}" class="alert alert-success">Account created. Please sign in.</div>
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
    <p class="mt-3 text-center">
        New here? <a th:href="@{/register}">Create an account</a>
    </p>
</div>
</body>
</html>
