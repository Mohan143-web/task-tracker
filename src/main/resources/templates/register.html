<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Task Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width:420px;margin-top:80px">
    <h2 class="mb-4">Create account</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" minlength="3" maxlength="50" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" minlength="4" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>
    <p class="mt-3 text-center">
        Have an account? <a th:href="@{/login}">Sign in</a>
    </p>
</div>
</body>
</html>
