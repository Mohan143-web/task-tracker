<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${title} ?: 'Task Tracker'">Task Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">Task Tracker</a>
        <div class="ms-auto">
            <span sec:authorize="isAuthenticated()" class="text-light me-3">
                Hi, <span sec:authentication="name"></span>
            </span>
            <a sec:authorize="isAuthenticated()" class="btn btn-outline-light btn-sm"
               th:href="@{/logout}"
               onclick="event.preventDefault();document.getElementById('logoutForm').submit();">Logout</a>
            <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none">
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div th:replace="${content}"></div>
</main>
</body>
</html>
