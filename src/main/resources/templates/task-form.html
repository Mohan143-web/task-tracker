<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html(title='Task', content=~{::main})}">
<body>
<main>
    <h2 th:text="${task.id} == null ? 'New Task' : 'Edit Task'">Task</h2>

    <form th:action="${task.id} == null ? @{/tasks} : @{|/tasks/${task.id}|}"
          th:object="${task}" method="post" class="mt-3">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control" maxlength="200" required>
            <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="4" maxlength="2000"></textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Status</label>
                <select th:field="*{status}" class="form-select">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Due date</label>
                <input type="date" th:field="*{dueDate}" class="form-control">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/dashboard}" class="btn btn-link">Cancel</a>
    </form>
</main>
</body>
</html>
